  &nbsp;·&nbsp;
  本月 <span id="stat-month">0</span> 次
  &nbsp;·&nbsp;
  总访问量 <span id="stat-total">0</span> 次

<script>
(function() {
    const SHARE_ID = 'uVEXU0CJbC0XUe0n';
    const API_BASE = 'https://umami.520781.xyz/api';
    const CACHE_KEY = 'umami_stats';
    const CACHE_DURATION = 300000; // 5分钟缓存

    const todayEl = document.getElementById('stat-today');
    const monthEl = document.getElementById('stat-month');
    const totalEl = document.getElementById('stat-total');
    const container = document.getElementById('umami-stats');

    if (!todayEl || !monthEl || !totalEl || !container) return;

    async function fetchStats() {
        try {
            const shareRes = await fetch(`${API_BASE}/share/${SHARE_ID}`);
            const shareData = await shareRes.json();
            const token = shareData.token;

            const [todayData, monthData, totalData] = await Promise.all([
                fetch(`${API_BASE}/websites/${shareData.websiteId}/stats?startAt=${getStartOfDay()}&endAt=${Date.now()}`, {
                    headers: { 'x-umami-share-token': token }
                }).then(r => r.json()),
                fetch(`${API_BASE}/websites/${shareData.websiteId}/stats?startAt=${getStartOfMonth()}&endAt=${Date.now()}`, {
                    headers: { 'x-umami-share-token': token }
                }).then(r => r.json()),
                fetch(`${API_BASE}/websites/${shareData.websiteId}/stats?startAt=0&endAt=${Date.now()}`, {
                    headers: { 'x-umami-share-token': token }
                }).then(r => r.json())
            ]);

            const today = sumPageviews(todayData);
            const month = sumPageviews(monthData);
            const total = sumPageviews(totalData);

            todayEl.textContent = today;
            monthEl.textContent = month;
            totalEl.textContent = total;
            container.style.display = '';

            localStorage.setItem(CACHE_KEY, JSON.stringify({
                today, month, total,
                timestamp: Date.now()
            }));
        } catch (e) {
            console.error('Umami stats error:', e);
            loadCache();
        }
    }

    function sumPageviews(data) {
        if (!data || !Array.isArray(data.pageviews)) return 0;
        return data.pageviews.reduce((s, p) => s + (p.y || 0), 0);
    }

    function getStartOfDay() {
        const d = new Date();
        return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    }

    function getStartOfMonth() {
        const d = new Date();
        return new Date(d.getFullYear(), d.getMonth(), 1).getTime();
    }

    function loadCache() {
        try {
            const raw = localStorage.getItem(CACHE_KEY);
            if (!raw) return;
            const c = JSON.parse(raw);
            if (Date.now() - c.timestamp > CACHE_DURATION) return;
            todayEl.textContent = c.today;
            monthEl.textContent = c.month;
            totalEl.textContent = c.total;
            container.style.display = '';
        } catch (e) {}
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', fetchStats);
    } else {
        fetchStats();
    }
})();
</script>
